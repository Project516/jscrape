# adapted from https://gist.github.com/Project516/2eccafb22440aca4793fcae1efa6da94

name: Generate Javadoc and deploy to GitHub Pages

on:
  push:
    branches:
       [ "master" ]

jobs:
  build:
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Generate JavaDoc
        run: ./gradlew javadoc

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./jscrape/build/docs/javadoc
          force_orphan: 'true'